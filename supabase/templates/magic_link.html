<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gents Chronicles</title>
</head>
<body style="margin:0;padding:0;background-color:#0D0D0D;font-family:'Georgia',serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0D0D0D;min-height:100vh;">
    <tr>
      <td align="center" style="padding:48px 16px;">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Top gold rule -->
          <tr>
            <td style="padding-bottom:32px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="height:1px;background:linear-gradient(to right, transparent, #C9A84C, transparent);font-size:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Wordmark -->
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <span style="font-family:'Georgia',serif;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#C9A84C;">
                The Gents Chronicles
              </span>
            </td>
          </tr>

          <!-- Divider dots -->
          <tr>
            <td align="center" style="padding-bottom:40px;">
              <span style="color:#C9A84C;font-size:10px;letter-spacing:6px;">· · ·</span>
            </td>
          </tr>

          <!-- Headline -->
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <h1 style="margin:0;font-family:'Georgia',serif;font-size:28px;font-weight:normal;color:#F0EDE8;line-height:1.3;">
                Your entrance awaits.
              </h1>
            </td>
          </tr>

          <!-- Body copy -->
          <tr>
            <td align="center" style="padding-bottom:40px;">
              <p style="margin:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.7;color:#8C8680;max-width:360px;">
                Click the button below to sign in to The Codex.
                This link expires in one hour and can only be used once.
              </p>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding-bottom:40px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;background-color:#C9A84C;color:#0D0D0D;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;padding:14px 40px;border-radius:4px;">
                Enter the Chronicles
              </a>
            </td>
          </tr>

          <!-- Fallback link -->
          <tr>
            <td align="center" style="padding-bottom:40px;">
              <p style="margin:0 0 8px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;color:#4A4744;">
                Or copy this link into your browser:
              </p>
              <p style="margin:0;font-family:'Courier New',monospace;font-size:10px;color:#615D5A;word-break:break-all;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>

          <!-- Bottom gold rule -->
          <tr>
            <td style="padding-top:8px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="height:1px;background:linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);font-size:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;color:#3A3836;">
                If you didn't request this, you can safely ignore it.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
