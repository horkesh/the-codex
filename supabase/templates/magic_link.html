<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gents Chronicles</title>
</head>
<body style="margin:0;padding:0;background-color:#0D0D0D;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0D0D0D;">
    <tr>
      <td align="center" style="padding:40px 24px;">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:400px;">

          <tr>
            <td align="center" style="padding-bottom:24px;">
              <span style="font-family:Georgia,serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:#C9A84C;">
                The Gents Chronicles
              </span>
            </td>
          </tr>

          <tr>
            <td style="height:1px;background-color:#C9A84C;opacity:0.4;font-size:0;">&nbsp;</td>
          </tr>

          <tr>
            <td align="center" style="padding:32px 0 20px;">
              <p style="margin:0 0 8px;font-family:Georgia,serif;font-size:22px;color:#F0EDE8;line-height:1.3;">
                Your entrance awaits.
              </p>
              <p style="margin:0 0 28px;font-family:Arial,sans-serif;font-size:12px;color:#8C8680;letter-spacing:0.05em;">
                Enter this code in the app
              </p>

              <!-- 6-digit OTP — primary action -->
              <div style="display:inline-block;background-color:#141019;border:1px solid rgba(201,168,76,0.35);border-radius:6px;padding:18px 40px;margin-bottom:28px;">
                <span style="font-family:Georgia,serif;font-size:42px;font-weight:700;letter-spacing:0.18em;color:#C9A84C;">
                  {{ .Token }}
                </span>
              </div>

              <!-- Magic link fallback -->
              <p style="margin:0 0 12px;font-family:Arial,sans-serif;font-size:11px;color:#4A4744;letter-spacing:0.05em;">
                or tap the button to open directly in your browser
              </p>
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;background-color:transparent;color:#C9A84C;font-family:Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;padding:10px 28px;border-radius:3px;border:1px solid rgba(201,168,76,0.4);">
                Open in browser
              </a>
            </td>
          </tr>

          <tr>
            <td style="height:1px;background-color:#C9A84C;opacity:0.15;font-size:0;">&nbsp;</td>
          </tr>

          <tr>
            <td align="center" style="padding-top:20px;">
              <p style="margin:0;font-family:Arial,sans-serif;font-size:11px;color:#4A4744;">
                Code expires in 1 hour &nbsp;·&nbsp; If this wasn't you, ignore it.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
