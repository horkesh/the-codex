name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Vercel (frontend) ────────────────────────────────────────────────────
      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_SpPoZYOLWh3JTJjuvfZG10Xn
          VERCEL_PROJECT_ID: prj_iU3ov4FHk374t4L6kjtHH7mT4zEu

      # ── Supabase edge functions ──────────────────────────────────────────────
      - name: Deploy Supabase functions
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        run: supabase db push --project-ref biioztjlsrkgwjyfegey
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push edge functions
        run: supabase functions deploy --project-ref biioztjlsrkgwjyfegey --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
